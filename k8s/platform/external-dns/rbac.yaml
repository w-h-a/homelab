apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-dns
  namespace: external-dns
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: external-dns
rules:
  # external-dns core: discover services and endpoints
  - apiGroups: [""]
    resources: [services, endpoints, pods]
    verbs: [get, list, watch]
  # external-dns core: node addresses for LoadBalancer resolution
  - apiGroups: [""]
    resources: [nodes]
    verbs: [list]
  # traefik-proxy source: read IngressRoute hostnames
  - apiGroups: [traefik.io]
    resources: [ingressroutes, ingressroutetcps, ingressrouteudps]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-dns
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: external-dns
subjects:
  - kind: ServiceAccount
    name: external-dns
    namespace: external-dns
