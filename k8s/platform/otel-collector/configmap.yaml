apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: otel-collector
data:
  config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      filelog:
        include:
          - /var/log/pods/*/*/*.log
        exclude:
          - /var/log/pods/otel-collector_*/*/*.log
          - /var/log/pods/kube-system_konnectivity-agent-*/*/*.log
        start_at: end
        include_file_path: true
        operators:
          - type: router
            id: route-by-format
            routes:
              - output: parser-cri
                expr: 'body matches "^[^ ]+ (stdout|stderr) "'
            default: extract-k8s-metadata
          - type: regex_parser
            id: parser-cri
            regex: '^(?P<time>[^ ]+) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$'
            output: move-log-to-body
            timestamp:
              parse_from: attributes.time
              layout_type: gotime
              layout: '2006-01-02T15:04:05.999999999Z07:00'
          - type: move
            id: move-log-to-body
            from: attributes.log
            to: body
            output: move-stream
          - type: move
            id: move-stream
            from: attributes.stream
            to: attributes["log.iostream"]
            output: extract-k8s-metadata
          - type: regex_parser
            id: extract-k8s-metadata
            regex: '^.*\/(?P<namespace>[^_]+)_(?P<pod_name>[^_]+)_(?P<uid>[a-f0-9-]+)\/(?P<container_name>[^\/]+)\/.*$'
            parse_from: attributes["log.file.path"]
          - type: move
            from: attributes.namespace
            to: resource["k8s.namespace.name"]
          - type: move
            from: attributes.pod_name
            to: resource["k8s.pod.name"]
          - type: move
            from: attributes.uid
            to: resource["k8s.pod.uid"]
          - type: move
            from: attributes.container_name
            to: resource["k8s.container.name"]
          - type: copy
            from: resource["k8s.container.name"]
            to: resource["service.name"]
          - type: json_parser
            id: parser-json
            if: 'body matches "^\\{"'
            parse_to: body
            trace:
              trace_id:
                parse_from: body.TraceId
              span_id:
                parse_from: body.SpanId

      k8sobjects:
        objects:
          - name: events
            mode: watch

      kubeletstats:
        collection_interval: 30s
        auth_type: serviceAccount
        endpoint: "https://${env:K8S_NODE_IP}:10250"
        insecure_skip_verify: false
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        metric_groups:
          - node
          - pod
          - container

    processors:
      memory_limiter:
        check_interval: 5s
        limit_mib: 200
        spike_limit_mib: 50

      batch:
        send_batch_size: 1024
        timeout: 5s

      k8sattributes:
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.container.name
            - k8s.node.name
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection

      resource/cluster:
        attributes:
          - key: k8s.cluster.name
            value: homelab-sfo3
            action: upsert

      resource/metrics:                                                                                                                          
        attributes:                                                                                                                              
          - key: service.name
            value: homelab-metrics
            action: upsert

      resource/logs:
        attributes:
          - key: service.name
            value: homelab-logs
            action: insert

    exporters:
      otlp/honeycomb:
        endpoint: api.honeycomb.io:443
        headers:
          x-honeycomb-team: "${env:HONEYCOMB_API_KEY}"

      otlp/honeycomb-metrics:
        endpoint: api.honeycomb.io:443
        headers:
          x-honeycomb-team: "${env:HONEYCOMB_API_KEY}"
          x-honeycomb-dataset: homelab-metrics

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resource/cluster, batch]
          exporters: [otlp/honeycomb]
        metrics:
          receivers: [otlp, kubeletstats]
          processors: [memory_limiter, k8sattributes, resource/cluster, resource/metrics, batch]
          exporters: [otlp/honeycomb-metrics]
        logs:
          receivers: [otlp, filelog, k8sobjects]
          processors: [memory_limiter, k8sattributes, resource/cluster, resource/logs, batch]
          exporters: [otlp/honeycomb]
