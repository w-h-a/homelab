apiVersion: v1
kind: ServiceAccount
metadata:
  name: tally-deployer
  namespace: tally
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tally-deployer
  namespace: tally
rules:
  # core resources managed by service deploy manifests
  - apiGroups: [""]
    resources: [services, configmaps, secrets, persistentvolumeclaims]
    verbs: [get, list, watch, create, update, patch]
  # workloads
  - apiGroups: [apps]
    resources: [deployments, statefulsets]
    verbs: [get, list, watch, create, update, patch]
  # sealed-secrets CRD
  - apiGroups: [bitnami.com]
    resources: [sealedsecrets]
    verbs: [get, list, watch, create, update, patch]
  # traefik ingress CRD
  - apiGroups: [traefik.io]
    resources: [ingressroutes]
    verbs: [get, list, watch, create, update, patch]
  # cert-manager CRD
  - apiGroups: [cert-manager.io]
    resources: [certificates]
    verbs: [get, list, watch, create, update, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tally-deployer
  namespace: tally
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tally-deployer
subjects:
  - kind: ServiceAccount
    name: tally-deployer
    namespace: tally
