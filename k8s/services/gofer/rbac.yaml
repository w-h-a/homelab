apiVersion: v1
kind: ServiceAccount
metadata:
  name: gofer-deployer
  namespace: gofer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gofer-deployer
  namespace: gofer
rules:
  # core resources managed by service deploy manifests
  - apiGroups: [""]
    resources: [services, configmaps, secrets]
    verbs: [get, list, watch, create, update, patch]
  # workloads
  - apiGroups: [apps]
    resources: [deployments, statefulsets]
    verbs: [get, list, watch, create, update, patch]
  # sealed-secrets CRD
  - apiGroups: [bitnami.com]
    resources: [sealedsecrets]
    verbs: [get, list, watch, create, update, patch]
  # traefik ingress CRD
  - apiGroups: [traefik.io]
    resources: [ingressroutes]
    verbs: [get, list, watch, create, update, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gofer-deployer
  namespace: gofer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gofer-deployer
subjects:
  - kind: ServiceAccount
    name: gofer-deployer
    namespace: gofer
