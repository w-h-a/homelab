name: Post-Merge

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - "k8s/**"

concurrency:
  group: post-merge
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      k8s: ${{ steps.filter.outputs.k8s }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3                                                                                                              
        id: filter                                                                                                                               
        with:                                                                                                                                    
          filters: |                                                                                                                             
            terraform:                                                                                                                         
              - 'terraform/**'
            k8s:
              - 'k8s/**'

  terraform-apply:
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_KEY }}
      TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.7"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve -no-color

  k8s-apply:
    needs: [changes, terraform-apply]
    if: |
      always() &&
      needs.changes.outputs.k8s == 'true' &&
      (needs.terraform-apply.result == 'success' || needs.terraform-apply.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save homelab-sfo3

      - name: Apply Traefik
        run: |
          kubectl apply --server-side --force-conflicts -f k8s/platform/traefik/crds.yaml
          kubectl apply -f k8s/platform/traefik/namespace.yaml
          kubectl apply -f k8s/platform/traefik/rbac.yaml
          kubectl apply -f k8s/platform/traefik/deployment.yaml
          kubectl apply -f k8s/platform/traefik/service.yaml
          kubectl rollout status deployment/traefik -n traefik --timeout=120s

      - name: Apply cert-manager
        run: |
          kubectl apply --server-side --force-conflicts -f k8s/platform/cert-manager/cert-manager.yaml
          kubectl rollout status deployment/cert-manager -n cert-manager --timeout=120s
          kubectl rollout status deployment/cert-manager-webhook -n cert-manager --timeout=120s
          kubectl rollout status deployment/cert-manager-cainjector -n cert-manager --timeout=120s
          kubectl apply -f k8s/platform/cert-manager/cluster-issuer-production.yaml
