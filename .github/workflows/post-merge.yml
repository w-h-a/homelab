name: Post-Merge

on:
  push:
    branches:
      - main

concurrency:
  group: post-merge
  cancel-in-progress: false

jobs:
  terraform-apply:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_KEY }}
      TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.7"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve -no-color

  k8s-apply:
    needs: [terraform-apply]
    if: |
      always() &&
      (needs.terraform-apply.result == 'success' || needs.terraform-apply.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save homelab-sfo3

      - name: Apply sealed-secrets
        run: |
          kubectl apply --server-side --force-conflicts -f k8s/platform/sealed-secrets/sealed-secrets.yaml
          kubectl rollout restart deployment/sealed-secrets-controller -n kube-system
          kubectl rollout status deployment/sealed-secrets-controller -n kube-system --timeout=120s

      - name: Apply OTel Collector
        run: |
          kubectl apply -f k8s/platform/otel-collector/namespace.yaml
          kubectl apply -f k8s/platform/otel-collector/sealed-honeycomb.yaml
          kubectl apply -f k8s/platform/otel-collector/rbac.yaml
          kubectl apply -f k8s/platform/otel-collector/configmap.yaml
          kubectl apply -f k8s/platform/otel-collector/service.yaml
          kubectl apply -f k8s/platform/otel-collector/daemonset.yaml
          kubectl rollout restart daemonset/otel-collector -n otel-collector
          kubectl rollout status daemonset/otel-collector -n otel-collector --timeout=120s

      - name: Apply Traefik
        run: |
          kubectl apply --server-side --force-conflicts -f k8s/platform/traefik/crds.yaml
          kubectl apply -f k8s/platform/traefik/namespace.yaml
          kubectl apply -f k8s/platform/traefik/rbac.yaml
          kubectl apply -f k8s/platform/traefik/deployment.yaml
          kubectl apply -f k8s/platform/traefik/service.yaml
          kubectl rollout restart deployment/traefik -n traefik
          kubectl rollout status deployment/traefik -n traefik --timeout=120s

      - name: Apply cert-manager
        run: |
          kubectl apply --server-side --force-conflicts -f k8s/platform/cert-manager/cert-manager.yaml
          kubectl rollout restart deployment/cert-manager -n cert-manager
          kubectl rollout restart deployment/cert-manager-webhook -n cert-manager
          kubectl rollout restart deployment/cert-manager-cainjector -n cert-manager
          kubectl rollout status deployment/cert-manager -n cert-manager --timeout=120s
          kubectl rollout status deployment/cert-manager-webhook -n cert-manager --timeout=120s
          kubectl rollout status deployment/cert-manager-cainjector -n cert-manager --timeout=120s
          kubectl apply -f k8s/platform/cert-manager/sealed-cloudflare.yaml
          kubectl apply -f k8s/platform/cert-manager/cluster-issuer-production.yaml

      - name: Apply external-dns
        run: |
          kubectl apply -f k8s/platform/external-dns/namespace.yaml
          kubectl apply -f k8s/platform/external-dns/sealed-cloudflare.yaml
          kubectl apply -f k8s/platform/external-dns/rbac.yaml
          kubectl apply -f k8s/platform/external-dns/deployment.yaml
          kubectl rollout restart deployment/external-dns -n external-dns
          kubectl rollout status deployment/external-dns -n external-dns --timeout=120s
